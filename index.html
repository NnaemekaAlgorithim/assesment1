<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InterviewGen • AI Interview Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-slate-50 to-gray-100 min-h-screen font-sans">
    <div class="max-w-2xl mx-auto px-6 py-12">
      <div class="text-center mb-10">
        <div class="inline-flex items-center gap-3 bg-white rounded-3xl px-6 py-3 shadow-sm mb-4">
          <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-inner">
            🤖
          </div>
          <h1 class="text-4xl font-semibold tracking-tight text-gray-900">InterviewGen</h1>
        </div>
        <p class="text-gray-600 text-lg">Instant AI-powered interview questions</p>
      </div>

      <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-gray-500 mb-2 tracking-widest">JOB TITLE</label>
            <input
              type="text"
              id="jobTitle"
              placeholder="e.g. Senior Product Manager, Backend Engineer"
              class="w-full px-5 py-4 text-lg rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all"
            />
          </div>

          <button
            id="submitBtn"
            class="w-full bg-gray-900 hover:bg-black active:scale-[0.985] transition-all text-white font-semibold text-lg py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg"
          >
            <span id="btnText">Generate Interview Questions</span>
            <div id="loader" class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin hidden"></div>
          </button>
        </div>

        <!-- Error Message -->
        <div id="error" class="hidden mt-6 bg-red-50 border border-red-200 text-red-600 px-5 py-3 rounded-2xl text-sm"></div>

        <!-- Results -->
        <div id="resultContainer" class="hidden mt-10">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-800">Generated Questions</h2>
            <button
              id="copyBtn"
              class="px-6 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-2xl text-sm font-medium transition-colors flex items-center gap-2"
            >
              📋 Copy
            </button>
          </div>
          <div id="output" class="bg-gray-50 border border-gray-100 rounded-3xl p-7 text-gray-700 leading-relaxed whitespace-pre-wrap min-h-[220px]"></div>
        </div>
      </div>

      <p class="text-center text-gray-500 text-sm mt-8">
        Powered by OpenRouter + Llama 3.1 8B
      </p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
