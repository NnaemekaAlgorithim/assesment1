<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep AI</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://tailwindcss.com"></script>
    <!-- Google Font -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-3xl shadow-2xl p-8 transition-all">
        <header class="text-center mb-8">
            <div class="brand-icon shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Interview Prep</h1>
            <p class="text-gray-500 text-sm">Generate smart questions for any role</p>
        </header>

        <div class="space-y-4">
            <div>
                <label class="label-text">Job Title</label>
                <input type="text" id="jobTitle" placeholder="e.g. Customer Success Manager"
                    class="input-field">
            </div>

            <button id="submitBtn" class="primary-button">
                <span id="btnText">Generate Questions</span>
                <div id="loader" class="loader hidden"></div>
            </button>
        </div>

        <!-- Result Area -->
        <div id="resultContainer" class="hidden mt-8 space-y-4 animate-slide-up">
            <div id="output" class="output-box">
                <!-- AI Content -->
            </div>
            <button id="copyBtn" class="secondary-button">
                Copy to Clipboard
            </button>
        </div>

        <div id="error" class="error-msg hidden"></div>
    </div>

    <!-- Import logic as a module to handle Gemini API -->
    <script type="module" src="script.js"></script>
</body>
</html>
